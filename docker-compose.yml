# auth-common 통합 실행 — api-gateway + auth-api + PostgreSQL을 한 번에 기동
#
# 두 앱은 별도 이미지(Jib로 빌드, Docker Hub 푸시)이지만 이 compose로 하나의 시스템처럼 실행한다.
#   docker compose pull && docker compose up -d
#
# 값은 같은 디렉터리의 .env 파일에서 주입한다(시크릿 포함). .env 예시는 README/배포 문서 참고.
# 필수 .env 키: DOCKERHUB_NAMESPACE, IMAGE_TAG, RSA_PRIVATE_KEY, RSA_PUBLIC_KEY,
#               AUTH_INTERNAL_API_KEY, AUTH_ISSUER_URI, EEOS_API_URI, CORS_ALLOWED_ORIGINS,
#               COOKIE_DOMAIN, REDIRECT_DEFAULT_URL, FRONTEND_LOGIN_URL (+ DB_* 선택)

services:
  auth-postgres:
    image: postgres:16
    container_name: auth-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-authdb}
      POSTGRES_USER: ${DB_USERNAME:-auth}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-auth1234}
    volumes:
      - auth-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-auth} -d ${DB_NAME:-authdb}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [auth-net]
    restart: unless-stopped

  auth-api:
    image: ${DOCKERHUB_NAMESPACE}/auth-api:${IMAGE_TAG:-latest}
    container_name: auth-api
    depends_on:
      auth-postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://auth-postgres:5432/${DB_NAME:-authdb}
      DB_USERNAME: ${DB_USERNAME:-auth}
      DB_PASSWORD: ${DB_PASSWORD:-auth1234}
      RSA_PRIVATE_KEY: ${RSA_PRIVATE_KEY}
      RSA_PUBLIC_KEY: ${RSA_PUBLIC_KEY}
      AUTH_INTERNAL_API_KEY: ${AUTH_INTERNAL_API_KEY}
      AUTH_ISSUER_URI: ${AUTH_ISSUER_URI}
      FRONTEND_LOGIN_URL: ${FRONTEND_LOGIN_URL}
      REDIRECT_DEFAULT_URL: ${REDIRECT_DEFAULT_URL}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    expose:
      - "8080"
    networks: [auth-net]
    restart: unless-stopped

  api-gateway:
    image: ${DOCKERHUB_NAMESPACE}/api-gateway:${IMAGE_TAG:-latest}
    container_name: api-gateway
    depends_on:
      - auth-api
    environment:
      # 게이트웨이 → 인증 서버는 내부 네트워크 서비스명으로 접근
      AUTH_API_URI: http://auth-api:8080
      AUTH_JWKS_URI: http://auth-api:8080/api/v1/admin/jwks
      # issuer는 토큰 발급(auth-api SAS)과 검증(gateway) 양쪽이 동일해야 함 — 게이트웨이 공개 URL
      AUTH_ISSUER_URI: ${AUTH_ISSUER_URI}
      EEOS_API_URI: ${EEOS_API_URI}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    networks: [auth-net]
    restart: unless-stopped

volumes:
  auth-postgres-data:

networks:
  auth-net:
    driver: bridge
