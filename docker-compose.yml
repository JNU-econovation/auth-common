# auth-common 통합 실행 — api-gateway + auth-api + PostgreSQL + flyway 마이그레이션을 한 번에 기동
#
# 앱 두 개(Jib 빌드)와 마이그레이션(auth-migration, db/Dockerfile 빌드) 모두 Docker Hub 에서 pull 한다.
# 마이그레이션 SQL 은 이미지에 포함되므로 호스트에 별도 파일을 둘 필요가 없다.
# 기동 순서: postgres(healthy) → flyway(migrate 후 종료) → auth-api → api-gateway
#   docker compose pull && docker compose up -d
#
# 값은 같은 디렉터리의 .env 파일에서 주입한다(시크릿 포함). .env 예시는 README/배포 문서 참고.
# 필수 .env 키: DOCKERHUB_NAMESPACE, IMAGE_TAG, RSA_PRIVATE_KEY, RSA_PUBLIC_KEY,
#               AUTH_INTERNAL_API_KEY, AUTH_ISSUER_URI, EEOS_API_URI, CORS_ALLOWED_ORIGINS,
#               COOKIE_DOMAIN, REDIRECT_DEFAULT_URL, FRONTEND_LOGIN_URL (+ DB_* 선택)

services:
  auth-postgres:
    image: postgres:16
    container_name: auth-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-authdb}
      POSTGRES_USER: ${DB_USERNAME:-auth}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-auth1234}
    volumes:
      - auth-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-auth} -d ${DB_NAME:-authdb}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [auth-net]
    restart: unless-stopped

  # 마이그레이션 적용 전용 one-shot 컨테이너. SQL 을 담은 이미지(db/Dockerfile)를 pull 해 migrate 후 종료.
  # 마이그레이션은 어느 앱/모듈에도 속하지 않고 db/migration 에서 독립 관리되며, 앱처럼 이미지로 배포된다.
  flyway:
    image: ${DOCKERHUB_NAMESPACE}/auth-migration:${IMAGE_TAG:-latest}
    container_name: auth-migration
    depends_on:
      auth-postgres:
        condition: service_healthy
    command: >
      -url=jdbc:postgresql://auth-postgres:5432/${DB_NAME:-authdb}
      -user=${DB_USERNAME:-auth}
      -password=${DB_PASSWORD:-auth1234}
      -connectRetries=10
      migrate
    networks: [auth-net]
    restart: on-failure

  auth-api:
    image: ${DOCKERHUB_NAMESPACE}/auth-api:${IMAGE_TAG:-latest}
    container_name: auth-api
    depends_on:
      auth-postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
    environment:
      DB_URL: jdbc:postgresql://auth-postgres:5432/${DB_NAME:-authdb}
      DB_USERNAME: ${DB_USERNAME:-auth}
      DB_PASSWORD: ${DB_PASSWORD:-auth1234}
      RSA_PRIVATE_KEY: ${RSA_PRIVATE_KEY}
      RSA_PUBLIC_KEY: ${RSA_PUBLIC_KEY}
      AUTH_INTERNAL_API_KEY: ${AUTH_INTERNAL_API_KEY}
      AUTH_ISSUER_URI: ${AUTH_ISSUER_URI}
      FRONTEND_LOGIN_URL: ${FRONTEND_LOGIN_URL}
      REDIRECT_DEFAULT_URL: ${REDIRECT_DEFAULT_URL}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      # 동적 라우트 변경 시 게이트웨이 내부 refresh 호출용
      GATEWAY_URI: http://api-gateway:8080
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
    expose:
      - "8080"
    healthcheck:
      # 루트(/)는 permitAll 헬스체크 엔드포인트 — 200 응답 시 ready로 판정
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    networks: [auth-net]
    restart: unless-stopped

  api-gateway:
    image: ${DOCKERHUB_NAMESPACE}/api-gateway:${IMAGE_TAG:-latest}
    container_name: api-gateway
    depends_on:
      auth-api:
        condition: service_healthy
    environment:
      # 게이트웨이 → 인증 서버는 내부 네트워크 서비스명으로 접근
      AUTH_API_URI: http://auth-api:8080
      AUTH_JWKS_URI: http://auth-api:8080/api/v1/admin/jwks
      # issuer는 토큰 발급(auth-api SAS)과 검증(gateway) 양쪽이 동일해야 함 — 게이트웨이 공개 URL
      AUTH_ISSUER_URI: ${AUTH_ISSUER_URI}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      # 내부 refresh 엔드포인트 검증용 — auth-api와 동일 값
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    networks: [auth-net]
    restart: unless-stopped

volumes:
  auth-postgres-data:

networks:
  auth-net:
    driver: bridge
