spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  session:
    store-type: jdbc
    jdbc:
      initialize-schema: never
  servlet:
    session:
      cookie:
        same-site: none
        secure: true
        http-only: true

# RSA 키 PEM 환경변수 (PKCS#8 BEGIN PRIVATE KEY / X.509 BEGIN PUBLIC KEY)
RSA_PRIVATE_KEY: ${RSA_PRIVATE_KEY}
RSA_PUBLIC_KEY: ${RSA_PUBLIC_KEY}

# SAS issuer (Gateway 공개 URL)
AUTH_ISSUER_URI: ${AUTH_ISSUER_URI:http://localhost:8080}

# 외부 SPA 로그인 URL — 미인증 /oauth2/authorize 진입 시 리다이렉트
auth:
  frontend-login-url: ${auth.frontend-login-url:http://localhost:3000/login}

# CORS 허용 오리진
CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
