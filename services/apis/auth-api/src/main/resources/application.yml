spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    # 운영 마이그레이션은 별도 flyway 컨테이너(docker-compose)가 적용한다.
    # 앱은 스키마를 적용하지 않고 ddl-auto=validate 로 검증만 한다.
    enabled: false
  servlet:
    session:
      cookie:
        same-site: none
        secure: true
        http-only: true

# Swagger / OpenAPI(springdoc) UI 동작 설정
springdoc:
  swagger-ui:
    tags-sorter: alpha          # 태그(도메인) 알파벳 정렬
    operations-sorter: method   # 엔드포인트를 HTTP 메서드 순으로 정렬
    doc-expansion: none         # 기본은 접힌 상태로 표시 (엔드포인트가 많을 때 가독성)
    display-request-duration: true

# RSA 키 PEM 환경변수 (PKCS#8 BEGIN PRIVATE KEY / X.509 BEGIN PUBLIC KEY)
RSA_PRIVATE_KEY: ${RSA_PRIVATE_KEY}
RSA_PUBLIC_KEY: ${RSA_PUBLIC_KEY}

# SAS issuer (Gateway 공개 URL)
AUTH_ISSUER_URI: ${AUTH_ISSUER_URI:http://localhost:8080}

# 외부 SPA 로그인 URL — 미인증 /oauth2/authorize 진입 시 리다이렉트
auth:
  # 역할: SAS 커스텀 로그인 페이지 경로 (경로 B 전용)
  # /oauth2/authorize 진입 시 미인증 상태에서 SPA 로그인 페이지로 리다이렉트하는 URL
  # LoginRedirectResolver(경로 A JSON 로그인 fallback)와 무관하다
  frontend-login-url: ${FRONTEND_LOGIN_URL:http://localhost:3000/login}
  redirect:
    # 역할: 경로 A WEB 302 fallback 목적지
    # /api/v1/auth/login 로그인 성공 시 clientId 미전달·미등록·redirect_uri 없음 시 사용하는 안전한 기본 목적지
    # auth.frontend-login-url과 역할이 다르므로 별도로 관리.
    default-url: ${REDIRECT_DEFAULT_URL:http://localhost:3000}
  token:
    at-expiry-seconds: ${AT_EXPIRY_SECONDS:3600}        # AT 만료: 1시간
    rt-expiry-seconds: ${RT_EXPIRY_SECONDS:2592000}     # RT 만료: 30일
  cookie:
    domain: ${COOKIE_DOMAIN:}
    secure: ${COOKIE_SECURE:false}

# CORS 허용 오리진
CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
