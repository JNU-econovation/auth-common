spring:
  cloud:
    gateway:
      globalcors:
        # Gateway 레벨 CORS — 업스트림이 처리하기 전에 preflight를 잡을 수 있으므로 양쪽 모두 설정
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "${CORS_ALLOWED_ORIGINS:http://localhost:3000}"
            allowedMethods: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: auth-api
          uri: ${AUTH_API_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**
        - id: sas-oauth2
          uri: ${AUTH_API_URI:http://localhost:8081}
          predicates:
            - Path=/oauth2/**
        - id: sas-well-known
          uri: ${AUTH_API_URI:http://localhost:8081}
          predicates:
            - Path=/.well-known/**
        - id: sas-userinfo
          uri: ${AUTH_API_URI:http://localhost:8081}
          predicates:
            - Path=/userinfo
        - id: eeos
          uri: ${EEOS_API_URI:http://localhost:8080}
          predicates:
            - Path=/api/**
  autoconfigure:
    exclude:
      - com.econo.common.auth.config.AuthAutoConfiguration

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

AUTH_JWKS_URI: ${AUTH_JWKS_URI:http://localhost:8081/oauth2/jwks}
AUTH_ISSUER_URI: ${AUTH_ISSUER_URI:http://localhost:8081}
EEOS_API_URI: ${EEOS_API_URI:http://localhost:8080}
