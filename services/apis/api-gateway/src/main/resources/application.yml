spring:
  cloud:
    gateway:
      globalcors:
        # Gateway 레벨 CORS — 업스트림이 처리하기 전에 preflight를 잡을 수 있으므로 양쪽 모두 설정
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "${CORS_ALLOWED_ORIGINS:http://localhost:3000}"
            allowedMethods: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      # 정적 YAML 라우트 선언 제거 — GatewayRoutingConfig(Java DSL)가 보호경로 정적 라우트를 관리하며,
      # DynamicRouteDefinitionRepository가 service_route 테이블에서 동적 라우트를 로드한다.
  autoconfigure:
    exclude:
      - com.econo.common.auth.config.AuthAutoConfiguration

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

gateway:
  internal-secret: ${GATEWAY_INTERNAL_SECRET:dev-secret}
  # 무효 토큰 분기 전용 — 미토큰은 경로 무관 passthrough (BearerToPassportFilter tokenless passthrough)
  permitted-paths:
    - /
    - /api/v1/auth/signup
    - /api/v1/auth/login
    - /api/v1/auth/logout
    - /api/v1/auth/reissue
    - /oauth2/**
    - /.well-known/**
    - /userinfo
    - /actuator/**
    - /api/health-check
    - /api/auth/**
    - /api/guest/**
    - /api/slack/events
    # Swagger / OpenAPI 문서 (auth-api로 라우팅, 공개 열람)
    - /swagger-ui/**
    - /swagger-ui.html
    - /v3/api-docs/**
    - /v3/api-docs
