spring:
  cloud:
    gateway:
      globalcors:
        # Gateway 레벨 CORS — 업스트림이 처리하기 전에 preflight를 잡을 수 있으므로 양쪽 모두 설정
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "${CORS_ALLOWED_ORIGINS:http://localhost:3000}"
            allowedMethods: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: auth-api
          uri: ${AUTH_API_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**
        - id: sas-well-known
          uri: ${AUTH_API_URI:http://localhost:8081}
          predicates:
            - Path=/.well-known/**
        - id: sas-userinfo
          uri: ${AUTH_API_URI:http://localhost:8081}
          predicates:
            - Path=/userinfo
        - id: eeos
          uri: ${EEOS_API_URI:http://localhost:8080}
          predicates:
            - Path=/api/**
  autoconfigure:
    exclude:
      - com.econo.common.auth.config.AuthAutoConfiguration

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

gateway:
  permitted-paths:
    - /
    - /api/v1/auth/signup
    - /api/v1/auth/login
    - /api/v1/auth/logout
    - /api/v1/auth/reissue
    - /.well-known/**
    - /userinfo
    - /actuator/**
    - /api/health-check
    - /api/auth/**
    - /api/guest/**
    - /api/slack/events
    # Swagger / OpenAPI 문서 (auth-api로 라우팅, 공개 열람)
    - /swagger-ui/**
    - /swagger-ui.html
    - /v3/api-docs/**
    - /v3/api-docs
