name: CI

on:
  push:
    branches: [ "main", "develop", "feat/**", "fix/**", "refactor/**", "chore/**" ]
  pull_request:
    branches: [ "main", "develop", "feat/**" ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Generate test RSA keys
        run: |
          openssl genrsa -out private.pem 2048 2>/dev/null
          openssl pkcs8 -topk8 -inform PEM -outform PEM -nocrypt -in private.pem -out private_pkcs8.pem
          openssl rsa -in private.pem -pubout -out public.pem 2>/dev/null
          {
            echo "RSA_PRIVATE_KEY<<EOF_RSA_PRIVATE"
            cat private_pkcs8.pem
            echo "EOF_RSA_PRIVATE"
            echo "RSA_PUBLIC_KEY<<EOF_RSA_PUBLIC"
            cat public.pem
            echo "EOF_RSA_PUBLIC"
          } >> $GITHUB_ENV

      - name: Build and Test
        run: ./gradlew build
        env:
          DB_URL: jdbc:postgresql://localhost:5432/test
          DB_USERNAME: test
          DB_PASSWORD: test
          AUTH_ISSUER_URI: http://localhost:8082
          AUTH_INTERNAL_API_KEY: test-internal-key
          AUTH_JWKS_URI: http://localhost:8082/oauth2/jwks
          FRONTEND_LOGIN_URL: http://localhost:3000/login
          COOKIE_DOMAIN: ""
          COOKIE_SECURE: "false"
          CORS_ALLOWED_ORIGINS: http://localhost:3000

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '**/build/test-results/test/TEST-*.xml'
